<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Everstat — Bientôt disponible</title>
  <link rel="icon" href="images/icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #080c14;
      color: #e8f0ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      text-align: center;
      padding: 40px 24px;
    }

    /* Mesh background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(0, 75, 175, 0.16) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(26, 111, 212, 0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Grid */
    .grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0, 75, 175, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 75, 175, 0.07) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 70%);
    }

    /* Content */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Logo */
    .logo-wrap {
      position: relative;
      margin-bottom: 2rem;
      animation: fadeUp 0.6s ease both;
    }

    .logo {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      box-shadow: 0 0 0 1px rgba(26, 111, 212, 0.3), 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .logo-glow {
      position: absolute;
      inset: -20px;
      background: radial-gradient(circle, rgba(26, 111, 212, 0.25) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.6;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.1);
      }
    }

    /* Wordmark */
    .wordmark {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.04em;
      color: #e8f0ff;
      margin-bottom: 0.5rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .wordmark span {
      background: linear-gradient(135deg, #1a6fd4, #2a88f5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(0, 75, 175, 0.12);
      border: 0.5px solid rgba(26, 111, 212, 0.35);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      color: #60aaff;
      margin-bottom: 2.5rem;
      letter-spacing: 0.04em;
      animation: fadeUp 0.6s 0.15s ease both;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2ab85a;
      box-shadow: 0 0 6px #2ab85a;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* Headline */
    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 600;
      letter-spacing: -0.04em;
      line-height: 1.1;
      color: #e8f0ff;
      margin-bottom: 1.2rem;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    h1 em {
      font-style: normal;
      background: linear-gradient(135deg, #1a6fd4, #60aaff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Tagline */
    .tagline {
      font-size: clamp(1rem, 2vw, 1.15rem);
      color: #7a9abf;
      font-weight: 300;
      font-style: italic;
      margin-bottom: 1rem;
      animation: fadeUp 0.6s 0.25s ease both;
    }

    /* Sub */
    .sub {
      font-size: 15px;
      color: #7a9abf;
      font-weight: 300;
      line-height: 1.7;
      max-width: 420px;
      margin-bottom: 3rem;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    /* Progress bar */
    .progress-wrap {
      width: 280px;
      margin-bottom: 3rem;
      animation: fadeUp 0.6s 0.35s ease both;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #3a5070;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }

    .progress-track {
      height: 4px;
      background: rgba(26, 111, 212, 0.15);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #1a6fd4, #2a88f5);
      box-shadow: 0 0 10px rgba(26, 111, 212, 0.5);
      animation: progressAnim 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes progressAnim {
      from {
        width: 0%;
      }

      to {
        width: 95%;
      }
    }

    /* Notify */
    .notify-wrap {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 3rem;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .notify-input {
      background: rgba(255, 255, 255, 0.04);
      border: 0.5px solid rgba(30, 130, 255, 0.2);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 14px;
      color: #e8f0ff;
      font-family: 'Inter', sans-serif;
      outline: none;
      width: 220px;
      transition: border-color 0.2s;
    }

    .notify-input::placeholder {
      color: #3a5070;
    }

    .notify-input:focus {
      border-color: rgba(26, 111, 212, 0.5);
    }

    .notify-btn {
      background: linear-gradient(135deg, #0f5fc8, #2a88f5);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.01em;
    }

    .notify-btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(26, 111, 212, 0.3);
    }

    .notify-confirm {
      display: none;
      font-size: 13px;
      color: #2ab85a;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
    }

    .notify-confirm.show {
      display: flex;
      animation: fadeUp 0.3s ease both;
    }

    /* Play Store link */
    .store-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.04);
      border: 0.5px solid rgba(30, 130, 255, 0.2);
      border-radius: 10px;
      padding: 11px 20px;
      text-decoration: none;
      color: #7a9abf;
      font-size: 13px;
      transition: all 0.2s;
      animation: fadeUp 0.6s 0.45s ease both;
    }

    .store-link:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(26, 111, 212, 0.4);
      color: #e8f0ff;
      transform: translateY(-2px);
    }

    .store-link img {
      height: 20px;
      display: block;
      filter: brightness(0.7);
      transition: filter 0.2s;
    }

    .store-link:hover img {
      filter: brightness(1);
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: #3a5070;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
